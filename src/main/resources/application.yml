server:
  port: 8091
  address: 0.0.0.0

spring:
  application:
    name: stack-pilot
  main:
    banner-mode: "off"

stackpilot:
  logs-dir: logs
  max-log-lines: 500
  external-scan-interval-ms: 5000
  auth:
    # Set false for public access (no API key). Auth code remains; filter bypasses when disabled.
    enabled: false
    # Override with env STACKPILOT_AUTH_API_KEY. Required for direct :8091 access from non-localhost.
    api-key: ${STACKPILOT_AUTH_API_KEY:JSiRBF6Ct40UAYLvO8cdpwxl9ET1WrVQ}
    allow-localhost-without-key: true
    trust-proxy-headers: true
  nginx:
    home: "C:/nginx-1.30.3"
    port: 80
    error-log: logs/error.log
    access-log: logs/access.log
    health-checks:
      - name: localhost
        url: "http://localhost/"
      - name: delena.buzz
        url: "http://127.0.0.1/"
        host-header: delena.buzz
      - name: control.delena.buzz
        url: "http://127.0.0.1/"
        host-header: control.delena.buzz
  host:
    enabled: true
    shutdown-delay-seconds: 60
    confirm-phrase-restart: "RESTART SERVER"
    confirm-phrase-shutdown: "SHUTDOWN SERVER"
  rdp:
    enabled: true
    scripts-home: "E:/Source/stack-pilot"
    confirm-phrase-recover: "RECOVER RDP"
    confirm-phrase-apply-mitigations: "APPLY RDP FIX"
    monitor:
      enabled: true
      poll-interval-ms: 60000
      alert-after-crashes-in-hours: 2
    webhook:
      enabled: false
      # Discord webhook URL or generic POST endpoint — set enabled: true when configured
      url: ""
      format: discord
      cooldown-minutes: 30
      dashboard-url: "http://control.delena.buzz/"
  boot:
    auto-start-services: true
    auto-start-nginx: true
    auto-apply-rdp-mitigations: true
    startup-delay-ms: 45000
  services:
    python-downloader:
      working-dir: "E:/Source/grok_dev/python"
      command: "python run_data_downloader.py"
      direct-launch: true
      environment:
        PYTHONIOENCODING: "utf-8"
        PYTHONUTF8: "1"
      log-file: python.log
      process-name: "python.exe"
      process-match: "run_data_downloader.py"
    python-order-rsi:
      working-dir: "E:/Source/grok_dev/python"
      command: "python run_order_rsi.py"
      direct-launch: true
      environment:
        PYTHONIOENCODING: "utf-8"
        PYTHONUTF8: "1"
        ORDER_RSI_MODE: "tick"
        ORDER_RSI_TICK_MS: "250"
        ORDER_RSI_POLL_MS: "1000"
        ORDER_RSI_HISTORY_BARS: "5000"
        BROKER_SERVER_ZONE: "Etc/GMT-3"
      log-file: order-rsi.log
      process-name: "python.exe"
      process-match: "run_order_rsi.py"
    backend:
      working-dir: "E:/Source/grok_dev/backend"
      command: "mvn spring-boot:run"
      log-file: backend.log
      port: 8081
    frontend:
      working-dir: "E:/Source/grok_dev/frontend"
      command: "npm run start"
      log-file: frontend.log
      port: 4200
