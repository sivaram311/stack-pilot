# Reverse proxy for delena.buzz
#   /     -> Angular dev server or static build (localhost:4200)
#   /api/ -> Spring Boot backend (localhost:8081)

server {
    listen       80;
    server_name  delena.buzz www.delena.buzz;

    access_log  logs/delena.buzz.access.log;
    error_log   logs/delena.buzz.error.log;

    # Spring Boot API — same origin as frontend (avoids CORS)
    location /api/ {
        proxy_pass         http://127.0.0.1:8081/api/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # SSE streams (order-rsi, health, gann, ny-liquidity)
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass         http://127.0.0.1:4200;
        proxy_http_version 1.1;

        proxy_set_header   Host              127.0.0.1:4200;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # WebSocket support (Angular dev server HMR)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}
