# Reverse proxy for control.delena.buzz -> Stack Pilot (localhost:8091)
# Stack Pilot serves UI + /api on the same port — no separate API proxy needed.

server {
    listen       80;
    server_name  control.delena.buzz;

    access_log  logs/control.delena.buzz.access.log;
    error_log   logs/control.delena.buzz.error.log;

    location / {
        proxy_pass         http://127.0.0.1:8091;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
