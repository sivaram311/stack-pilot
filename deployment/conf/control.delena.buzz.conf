# Reverse proxy for control.delena.buzz -> Stack Pilot (localhost:5091)
# Stack Pilot serves UI + /api on the same port — no separate API proxy needed.
# Basic auth: run deployment/scripts/setup-control-auth.ps1 then sync-nginx-config.ps1 -Reload
# Disabled while stackpilot.auth.enabled=false (public access). Re-enable auth_basic lines to lock down.
# DNS: cloudflare-dns.ps1 -Upsert -Name control -Proxied (deploy-prod-app.ps1 blocks subdomain control)

server {
    listen       80;
    server_name  control.delena.buzz;

    access_log  logs/control.delena.buzz.access.log;
    error_log   logs/control.delena.buzz.error.log;

    # auth_basic           "Stack Pilot Control";
    # auth_basic_user_file conf/.htpasswd-control;

    location / {
        proxy_pass         http://127.0.0.1:5091;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
